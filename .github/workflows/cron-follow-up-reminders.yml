name: Cron — Follow-up reminders

on:
  schedule:
    # Daily at 06:00 UTC — Zimbabwe target market: 08:00 local (UTC+2). If the target market is US, pick a different hour.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger follow-up-reminders cron
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing required secrets: APP_URL and/or CRON_SECRET"
            exit 1
          fi

          response=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: GitHub-Actions-Cron/1.0" \
            --max-time 120 \
            "$APP_URL/api/cron/follow-up-reminders")

          echo "HTTP Status: $response"
          echo "Response body:"
          cat /tmp/body.txt
          echo ""

          if [ "$response" -ne 200 ]; then
            echo "::error::Cron endpoint returned non-200 status: $response"
            exit 1
          fi
