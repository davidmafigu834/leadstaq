name: Cron — Check uncontacted leads

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # Allows manual trigger from GitHub UI for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger check-leads cron
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing required secrets: APP_URL and/or CRON_SECRET"
            exit 1
          fi

          response=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: GitHub-Actions-Cron/1.0" \
            --max-time 60 \
            "$APP_URL/api/cron/check-leads")

          echo "HTTP Status: $response"
          echo "Response body:"
          cat /tmp/body.txt
          echo ""

          if [ "$response" -ne 200 ]; then
            echo "::error::Cron endpoint returned non-200 status: $response"
            exit 1
          fi
